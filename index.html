<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Your Gift ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<div class="hearts"></div>

<section class="hero">

    <div class="card">

        <h2>Hello, Beautiful 🌸</h2>

        <h1>Open Your Gift</h1>

        <p>
            Ada sesuatu yang ingin aku sampaikan.
            Semoga halaman kecil ini bisa membuat harimu sedikit lebih indah.
        </p>

        <button id="openGift">
            🎁 Open
        </button>

    </div>

</section>


<section id="giftSection" class="hidden">

    <div class="letter">

        <h2>💌 A Letter For You</h2>

        <p id="typing">
            Tulis suratmu di sini...
        </p>

    </div>


    <div class="gallery">

        <h2>📸 Our Memories</h2>

        <div class="photos">

            <div class="photo">
                <img src="images/foto1.jpg" alt="">
            </div>

            <div class="photo">
                <img src="images/foto2.jpg" alt="">
            </div>

            <div class="photo">
                <img src="images/foto3.jpg" alt="">
            </div>

        </div>

    </div>


    <div class="music">

        <h2>🎵 Our Song</h2>

        <audio id="bgMusic" controls>
            <source src="music/lagu.mp3" type="audio/mpeg">
        </audio>

    </div>

</section>


<div id="confetti"></div>

<script src="script.js"></script>

</body>
</html>
